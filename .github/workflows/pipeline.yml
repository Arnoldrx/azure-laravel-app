name: Deploy Laravel backend to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, openssl, tokenizer,
            fileinfo
          coverage: none

      - name: Copy env template for artisan commands
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: Generate temporary app key for build-time artisan use
        run: php artisan key:generate

      - name: Clear cached config
        run: |
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear

      - name: Prepare deployment package
        run: |
          rm -rf deploy
          mkdir deploy
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='deploy' \
            ./ deploy/

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: arnoldrx-laravel-app
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./deploy
